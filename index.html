<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="전화 연습" />
  <meta name="theme-color" content="#FFF8F0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>📞 전화번호 연습</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF8F0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .title { font-size: 22px; font-weight: 900; color: #FF6B6B; }
    .edit-toggle {
      background: white;
      border: 2.5px solid #FFD6CC;
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 900;
      color: #FF9966;
      cursor: pointer;
    }
    .edit-toggle:active { transform: scale(0.95); }

    /* ── Family Grid ── */
    .family-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      width: 100%;
      margin-bottom: 12px;
    }
    .family-btn {
      background: white;
      border: 3px solid #FFD6CC;
      border-radius: 14px;
      padding: 7px 3px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: transform 0.12s;
      position: relative;
    }
    .family-btn:active { transform: scale(0.92); }
    .family-btn.selected { border-color: #FF6B6B; transform: scale(1.04); }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      overflow: hidden;
      background: #FFE8E0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .family-label { font-size: 11px; font-weight: 900; color: #555; text-align: center; line-height: 1.2; }
    .edit-badge {
      display: none;
      position: absolute;
      top: -4px; right: -4px;
      width: 18px; height: 18px;
      background: #FF9966;
      border-radius: 50%;
      font-size: 10px;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .edit-mode .edit-badge { display: flex; }

    /* ── Phone Display ── */
    .phone-display {
      width: 100%;
      background: white;
      border-radius: 18px;
      border: 3px solid #FFD6CC;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .display-label { font-size: 11px; font-weight: 900; color: #FFAA88; margin-bottom: 5px; letter-spacing: 0.5px; }
    .number-row { display: flex; align-items: center; gap: 3px; flex-wrap: nowrap; overflow: hidden; }
    .digit-box {
      flex: 1; min-width: 0; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 900; color: #FF6B6B;
      background: #FFF0ED; border-radius: 7px; border: 2px solid #FFD6CC;
    }
    .sep-box { font-size: 18px; font-weight: 900; color: #FFAA88; flex-shrink: 0; width: 10px; text-align: center; }
    .divider { height: 2px; background: #FFE8E0; border-radius: 2px; margin: 8px 0; }
    .typed-label { font-size: 11px; font-weight: 900; color: #88BBFF; margin-bottom: 5px; letter-spacing: 0.5px; }
    .typed-box {
      flex: 1; min-width: 0; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 900;
      border-radius: 7px; border: 2px dashed #BBDDFF;
      color: transparent; background: #F0F6FF;
      transition: all 0.15s;
    }
    .typed-box.filled { border: 2px solid #5599FF; background: #E6F0FF; color: #3366EE; }
    .typed-box.correct { background: #E6FFE6; border-color: #44BB44; color: #228822; }
    .typed-box.wrong { background: #FFE6E6; border-color: #FF4444; color: #CC2222; }
    .progress-bar-wrap { width: 100%; height: 7px; background: #FFE8E0; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: #FF9966; border-radius: 8px; transition: width 0.3s ease; width: 0%; }

    /* ── Success ── */
    .success-banner {
      display: none;
      background: #44CC44; color: white;
      border-radius: 14px; padding: 9px 16px;
      font-size: 17px; font-weight: 900; text-align: center;
      margin-bottom: 10px; width: 100%;
      animation: pop 0.35s ease;
    }
    .success-banner.show { display: block; }
    @keyframes pop { 0%{transform:scale(0.85)} 60%{transform:scale(1.08)} 100%{transform:scale(1)} }

    /* ── Keypad ── */
    .keypad { width: 100%; background: white; border-radius: 18px; border: 3px solid #FFD6CC; padding: 12px; }
    .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .key-btn {
      background: #FFF8F0; border: 2.5px solid #FFD6CC; border-radius: 12px;
      height: 58px; font-size: 24px; font-weight: 900; color: #444;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.08s, background 0.08s;
      user-select: none; -webkit-user-select: none; width: 100%;
      font-family: 'Nunito', sans-serif;
    }
    .key-btn:active { transform: scale(0.88); background: #FFE8E0; }
    .key-btn.del-btn { font-size: 20px; background: #FFF0F0; border-color: #FFBBBB; color: #FF4444; }
    .key-btn.empty-btn { background: transparent; border: none; pointer-events: none; }

    .placeholder { text-align: center; color: #FFBBAA; font-size: 14px; font-weight: 700; padding: 10px 0; }

    /* ── Edit Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 22px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 900; color: #FF6B6B; margin-bottom: 16px; text-align: center; }
    .modal-avatar-wrap {
      display: flex; justify-content: center; margin-bottom: 16px;
    }
    .modal-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px dashed #FFD6CC;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; cursor: pointer; overflow: hidden;
      background: #FFF0ED; position: relative;
    }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .modal-avatar-hint {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.45); color: white;
      font-size: 10px; font-weight: 900; text-align: center; padding: 3px 0;
    }
    .field-label { font-size: 12px; font-weight: 900; color: #FFAA88; margin-bottom: 5px; }
    .field-input {
      width: 100%; padding: 10px 12px;
      border: 2.5px solid #FFD6CC; border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; color: #444;
      margin-bottom: 14px; outline: none;
    }
    .field-input:focus { border-color: #FF9966; }
    .modal-emoji-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
      margin-bottom: 14px;
    }
    .emoji-btn {
      font-size: 24px; padding: 6px; border-radius: 8px;
      border: 2px solid #FFD6CC; background: #FFF8F0;
      cursor: pointer; text-align: center;
    }
    .emoji-btn.selected { border-color: #FF6B6B; background: #FFE8E0; }
    .emoji-btn:active { transform: scale(0.9); }
    .modal-btns { display: flex; gap: 8px; }
    .btn-save {
      flex: 1; padding: 12px; border-radius: 12px;
      background: #FF6B6B; color: white; border: none;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
      cursor: pointer;
    }
    .btn-cancel {
      padding: 12px 16px; border-radius: 12px;
      background: #FFF0F0; color: #FF9966; border: 2px solid #FFD6CC;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
      cursor: pointer;
    }
    .btn-delete {
      padding: 12px; border-radius: 12px;
      background: #FFF0F0; color: #FF4444; border: 2px solid #FFBBBB;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900;
      cursor: pointer;
    }
    #photoInput { display: none; }

    /* ── Install Banner ── */
    .install-banner {
      display: none;
      width: 100%; background: white;
      border: 2.5px solid #FFD6CC; border-radius: 14px;
      padding: 10px 14px; margin-bottom: 12px;
      align-items: center; gap: 10px;
    }
    .install-banner.show { display: flex; }
    .install-banner p { font-size: 12px; font-weight: 700; color: #888; flex: 1; line-height: 1.4; }
    .install-banner p strong { color: #FF6B6B; }
    .btn-install {
      background: #FF6B6B; color: white; border: none;
      border-radius: 10px; padding: 8px 14px;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
      cursor: pointer; white-space: nowrap;
    }
    .btn-dismiss {
      background: none; border: none; font-size: 18px; color: #CCC; cursor: pointer; padding: 0 2px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <p><strong>홈 화면에 추가</strong>하면 앱처럼 쓸 수 있어요!</p>
    <button class="btn-install" id="installBtn">설치</button>
    <button class="btn-dismiss" id="dismissBtn">✕</button>
  </div>

  <div class="header">
    <div class="title">📞 전화번호 연습</div>
    <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">✏️ 편집</button>
  </div>

  <div class="family-grid" id="familyGrid"></div>

  <div class="success-banner" id="successBanner">🎉 완벽해요! 정말 잘했어요! 🎉</div>

  <div class="phone-display" id="phoneDisplay" style="display:none;">
    <div class="display-label">📖 따라 누를 번호</div>
    <div class="number-row" id="targetNumber"></div>
    <div class="divider"></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="typed-label">✏️ 내가 누른 번호</div>
    <div class="number-row" id="typedNumber"></div>
  </div>

  <div class="placeholder" id="placeholder">👆 가족을 눌러서 시작해요!</div>

  <div class="keypad" id="keypad" style="display:none;">
    <div class="keypad-grid" id="keypadGrid"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">가족 편집</div>
    <div class="modal-avatar-wrap">
      <div class="modal-avatar" id="modalAvatar" onclick="document.getElementById('photoInput').click()">
        <span id="modalAvatarEmoji">👶</span>
        <div class="modal-avatar-hint">사진 변경</div>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoChange(event)" />

    <div class="field-label">이름</div>
    <input class="field-input" id="editName" type="text" placeholder="예: 엄마" maxlength="6" />

    <div class="field-label">전화번호 (숫자만 입력, 자동으로 - 추가)</div>
    <input class="field-input" id="editPhone" type="tel" placeholder="01012345678" maxlength="11" />

    <div class="field-label">기본 이모지 (사진 없을 때)</div>
    <div class="modal-emoji-grid" id="emojiGrid"></div>

    <div class="modal-btns">
      <button class="btn-delete" id="deleteBtn" onclick="deleteMember()">🗑️</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveMember()">저장 ✓</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['👩','👨','👵','👴','👧','👦','👶','🧑','👩‍🦰','👨‍🦰','👩‍🦳','👨‍🦳','🧒','👱','🤶','🎅'];
const COLORS = ['#FFD6F0','#D6E8FF','#FFE8D6','#D6FFE8','#FFF3CC','#E8D6FF','#D6FFE8','#FFD6D6'];
const DEFAULT_FAMILY = [
  { name: '엄마', emoji: '👩', color: '#FFD6F0', phone: '010-1234-5678', photo: null },
  { name: '아빠', emoji: '👨', color: '#D6E8FF', phone: '010-9876-5432', photo: null },
  { name: '할머니', emoji: '👵', color: '#FFE8D6', phone: '010-1111-2222', photo: null },
  { name: '할아버지', emoji: '👴', color: '#D6FFE8', phone: '010-3333-4444', photo: null },
];

let family = [];
let selectedIdx = null;
let typedDigits = [];
let targetDigits = [];
let succeeded = false;
let editMode = false;
let editingIdx = null;
let editPhotoData = null;
let deferredPrompt = null;

function loadFamily() {
  try {
    const saved = localStorage.getItem('phoneAppFamily');
    family = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_FAMILY));
  } catch(e) { family = JSON.parse(JSON.stringify(DEFAULT_FAMILY)); }
}
function saveFamily() {
  localStorage.setItem('phoneAppFamily', JSON.stringify(family));
}

function formatPhone(digits) {
  const d = digits.replace(/\D/g, '');
  if (d.length === 11) return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
  if (d.length === 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
  return d;
}

function getDigitsOnly(phone) { return phone.replace(/-/g, '').split(''); }

// ── Render Family Grid ──
function buildFamilyGrid() {
  const grid = document.getElementById('familyGrid');
  grid.innerHTML = '';
  family.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'family-btn' + (selectedIdx === i ? ' selected' : '');
    btn.id = 'fam-' + i;

    let avatarInner = '';
    if (f.photo) {
      avatarInner = `<img src="${f.photo}" alt="${f.name}" />`;
    } else {
      avatarInner = f.emoji;
    }

    btn.innerHTML = `
      <div class="avatar" style="background:${f.color}">${avatarInner}</div>
      <div class="family-label">${f.name}</div>
      <div class="edit-badge">✏️</div>
    `;
    btn.addEventListener('click', () => editMode ? openModal(i) : selectFamily(i));
    grid.appendChild(btn);
  });

  // Add button in edit mode
  if (editMode) {
    const addBtn = document.createElement('button');
    addBtn.className = 'family-btn';
    addBtn.style.borderStyle = 'dashed';
    addBtn.innerHTML = `<div class="avatar" style="background:#F0F0F0;font-size:28px;">+</div><div class="family-label">추가</div>`;
    addBtn.addEventListener('click', () => openModal(-1));
    grid.appendChild(addBtn);
  }

  if (editMode) grid.classList.add('edit-mode');
  else grid.classList.remove('edit-mode');
}

function selectFamily(idx) {
  selectedIdx = idx;
  typedDigits = [];
  succeeded = false;
  document.getElementById('successBanner').classList.remove('show');
  targetDigits = getDigitsOnly(family[idx].phone);
  document.getElementById('phoneDisplay').style.display = 'block';
  document.getElementById('keypad').style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  buildFamilyGrid();
  renderTargetNumber();
  renderTypedNumber();
  updateProgress();
}

function renderTargetNumber() {
  const container = document.getElementById('targetNumber');
  container.innerHTML = '';
  const phone = family[selectedIdx].phone;
  const parts = phone.split('-');
  parts.forEach((part, pi) => {
    part.split('').forEach(ch => {
      const d = document.createElement('div');
      d.className = 'digit-box'; d.textContent = ch;
      container.appendChild(d);
    });
    if (pi < parts.length - 1) {
      const s = document.createElement('div');
      s.className = 'sep-box'; s.textContent = '-';
      container.appendChild(s);
    }
  });
}

function renderTypedNumber() {
  const container = document.getElementById('typedNumber');
  container.innerHTML = '';
  const phone = family[selectedIdx].phone;
  const parts = phone.split('-');
  let digitIdx = 0;
  parts.forEach((part, pi) => {
    part.split('').forEach(ch => {
      const d = document.createElement('div');
      d.className = 'typed-box';
      const typed = typedDigits[digitIdx];
      if (typed !== undefined) {
        d.classList.add('filled');
        d.textContent = typed;
        if (typed === ch) d.classList.add('correct');
        else d.classList.add('wrong');
      }
      digitIdx++;
      container.appendChild(d);
    });
    if (pi < parts.length - 1) {
      const s = document.createElement('div');
      s.className = 'sep-box'; s.textContent = '-';
      container.appendChild(s);
    }
  });
}

function updateProgress() {
  const pct = targetDigits.length > 0 ? (Math.min(typedDigits.length, targetDigits.length) / targetDigits.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function handleKey(k) {
  if (selectedIdx === null || succeeded || editMode) return;
  if (typedDigits.length >= targetDigits.length) return;
  typedDigits.push(k);
  renderTypedNumber();
  updateProgress();
  if (typedDigits.length === targetDigits.length) {
    if (typedDigits.every((d, i) => d === targetDigits[i])) {
      succeeded = true;
      document.getElementById('successBanner').classList.add('show');
    }
  }
}

function handleDelete() {
  if (selectedIdx === null || typedDigits.length === 0 || editMode) return;
  succeeded = false;
  document.getElementById('successBanner').classList.remove('show');
  typedDigits.pop();
  renderTypedNumber();
  updateProgress();
}

function buildKeypad() {
  const grid = document.getElementById('keypadGrid');
  grid.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9',null,'0','⌫'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    if (k === null) {
      btn.className = 'key-btn empty-btn';
    } else if (k === '⌫') {
      btn.className = 'key-btn del-btn';
      btn.textContent = '⌫';
      btn.addEventListener('click', handleDelete);
    } else {
      btn.className = 'key-btn';
      btn.textContent = k;
      btn.addEventListener('click', () => handleKey(k));
    }
    grid.appendChild(btn);
  });
}

// ── Edit Mode ──
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('editToggle').textContent = editMode ? '✓ 완료' : '✏️ 편집';
  document.getElementById('editToggle').style.color = editMode ? '#44BB44' : '#FF9966';
  buildFamilyGrid();
}

// ── Modal ──
function openModal(idx) {
  editingIdx = idx;
  editPhotoData = null;
  const isNew = idx === -1;
  document.getElementById('modalTitle').textContent = isNew ? '새 가족 추가' : '가족 편집';
  document.getElementById('deleteBtn').style.display = isNew ? 'none' : 'block';

  const f = isNew ? { name: '', emoji: '👶', color: '#FFE8E0', phone: '', photo: null } : family[idx];
  document.getElementById('editName').value = f.name;
  document.getElementById('editPhone').value = f.phone.replace(/-/g, '');

  const avatarEl = document.getElementById('modalAvatar');
  avatarEl.innerHTML = '';
  if (f.photo) {
    const img = document.createElement('img');
    img.src = f.photo;
    avatarEl.appendChild(img);
  } else {
    const span = document.createElement('span');
    span.id = 'modalAvatarEmoji';
    span.textContent = f.emoji;
    avatarEl.appendChild(span);
  }
  avatarEl.innerHTML += '<div class="modal-avatar-hint">사진 변경</div>';
  avatarEl.onclick = () => document.getElementById('photoInput').click();

  buildEmojiGrid(f.emoji);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('photoInput').value = '';
  editPhotoData = null;
}

function buildEmojiGrid(selectedEmoji) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (em === selectedEmoji ? ' selected' : '');
    btn.textContent = em;
    btn.onclick = () => {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      // Update modal avatar preview if no custom photo
      if (!editPhotoData) {
        const avatarEl = document.getElementById('modalAvatar');
        const emojiSpan = avatarEl.querySelector('span');
        if (emojiSpan) emojiSpan.textContent = em;
      }
    };
    grid.appendChild(btn);
  });
}

function handlePhotoChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    editPhotoData = ev.target.result;
    const avatarEl = document.getElementById('modalAvatar');
    avatarEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = editPhotoData;
    avatarEl.appendChild(img);
    avatarEl.innerHTML += '<div class="modal-avatar-hint">사진 변경</div>';
    avatarEl.onclick = () => document.getElementById('photoInput').click();
  };
  reader.readAsDataURL(file);
}

function saveMember() {
  const name = document.getElementById('editName').value.trim();
  const phoneRaw = document.getElementById('editPhone').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  if (phoneRaw.replace(/\D/g,'').length < 10) { alert('올바른 전화번호를 입력해주세요!'); return; }

  const selectedEmojiBtn = document.querySelector('.emoji-btn.selected');
  const emoji = selectedEmojiBtn ? selectedEmojiBtn.textContent : '👤';
  const phone = formatPhone(phoneRaw);
  const colorIdx = editingIdx >= 0 ? editingIdx % COLORS.length : family.length % COLORS.length;
  const photo = editPhotoData !== null ? editPhotoData : (editingIdx >= 0 ? family[editingIdx].photo : null);

  if (editingIdx === -1) {
    family.push({ name, emoji, color: COLORS[colorIdx], phone, photo });
  } else {
    family[editingIdx] = { ...family[editingIdx], name, emoji, phone, photo };
  }

  saveFamily();
  closeModal();
  buildFamilyGrid();

  // Reset game if edited selected member
  if (editingIdx === selectedIdx) {
    typedDigits = [];
    succeeded = false;
    targetDigits = getDigitsOnly(phone);
    document.getElementById('successBanner').classList.remove('show');
    renderTargetNumber();
    renderTypedNumber();
    updateProgress();
  }
}

function deleteMember() {
  if (!confirm('정말 삭제할까요?')) return;
  family.splice(editingIdx, 1);
  if (selectedIdx === editingIdx) {
    selectedIdx = null;
    document.getElementById('phoneDisplay').style.display = 'none';
    document.getElementById('keypad').style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
  } else if (selectedIdx > editingIdx) {
    selectedIdx--;
  }
  saveFamily();
  closeModal();
  buildFamilyGrid();
}

// ── PWA Install ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  if (!localStorage.getItem('installDismissed')) banner.classList.add('show');
});

document.getElementById('installBtn').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
});

document.getElementById('dismissBtn').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── Init ──
loadFamily();
buildFamilyGrid();
buildKeypad();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
